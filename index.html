<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity Web Player | Archive</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Chatbot Overlay Styles ── */
    #chatbot-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 10000;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(99, 102, 241, .45);
      transition: transform .2s, box-shadow .2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #chatbot-toggle:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 28px rgba(99, 102, 241, .6);
    }

    #chatbot-panel {
      position: fixed;
      bottom: 92px;
      right: 24px;
      z-index: 10000;
      width: 370px;
      height: 500px;
      border-radius: 16px;
      background: rgba(15, 15, 25, .88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, .1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      opacity: 0;
      transform: translateY(20px) scale(.95);
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
    }

    #chatbot-panel.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    #chatbot-header {
      padding: 16px 20px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: .3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #chatbot-header span.dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      display: inline-block;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .4;
      }
    }

    #chatbot-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #chatbot-messages::-webkit-scrollbar {
      width: 5px;
    }

    #chatbot-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    #chatbot-messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, .15);
      border-radius: 4px;
    }

    .chat-msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.5;
      word-wrap: break-word;
      animation: msg-in .25s ease;
    }

    @keyframes msg-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .chat-msg.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .chat-msg.bot {
      align-self: flex-start;
      background: rgba(255, 255, 255, .08);
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    .typing-indicator {
      align-self: flex-start;
      display: flex;
      gap: 5px;
      padding: 10px 14px;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .35);
      animation: typing-bounce .6s infinite alternate;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: .15s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: .3s;
    }

    @keyframes typing-bounce {
      to {
        opacity: .2;
        transform: translateY(-4px);
      }
    }

    #chatbot-input-area {
      display: flex;
      padding: 12px;
      gap: 8px;
      border-top: 1px solid rgba(255, 255, 255, .08);
      background: rgba(0, 0, 0, .25);
    }

    #chatbot-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, .12);
      background: rgba(255, 255, 255, .06);
      color: #f1f5f9;
      font-size: 13.5px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color .2s;
    }

    #chatbot-input::placeholder {
      color: rgba(255, 255, 255, .35);
    }

    #chatbot-input:focus {
      border-color: #8b5cf6;
    }

    #chatbot-send {
      padding: 0 16px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-weight: 600;
      font-size: 13.5px;
      cursor: pointer;
      transition: opacity .2s;
    }

    #chatbot-send:hover {
      opacity: .85;
    }

    #chatbot-send:disabled {
      opacity: .4;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <div id="unity-warning"> </div>
    <div id="unity-footer">
      <div id="unity-logo-title-footer"></div>
      <div id="unity-fullscreen-button"></div>
      <div id="unity-build-title">Archive</div>
    </div>
  </div>

  <!-- ── Chatbot UI ── -->
  <button id="chatbot-toggle" title="Chat with Campus Assistant">💬</button>
  <div id="chatbot-panel">
    <div id="chatbot-header">
      <span class="dot"></span> Campus Tour Assistant
    </div>
    <div id="chatbot-messages">
      <div class="chat-msg bot">Hi there! 👋 I'm your campus tour assistant. Ask me anything about the university!</div>
    </div>
    <div id="chatbot-input-area">
      <input id="chatbot-input" type="text" placeholder="Type a message…" autocomplete="off" />
      <button id="chatbot-send">Send</button>
    </div>
  </div>

  <script>
    var canvas = document.querySelector("#unity-canvas");

    // Shows a temporary message banner/ribbon for a few seconds, or
    // a permanent error message on top of the canvas if type=='error'.
    // If type=='warning', a yellow highlight color is used.
    // Modify or remove this function to customize the visually presented
    // way that non-critical warnings and error messages are presented to the
    // user.
    function unityShowBanner(msg, type) {
      var warningBanner = document.querySelector("#unity-warning");
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
      }
      var div = document.createElement('div');
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type == 'error') div.style = 'background: red; padding: 10px;';
      else {
        if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
        setTimeout(function () {
          warningBanner.removeChild(div);
          updateBannerVisibility();
        }, 5000);
      }
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/Virtual tour.loader.js";
    var config = {
      arguments: [],
      dataUrl: buildUrl + "/Virtual tour.data",
      frameworkUrl: buildUrl + "/Virtual tour.framework.js",
      codeUrl: buildUrl + "/Virtual tour.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "Archive",
      productVersion: "1.0",
      showBanner: unityShowBanner,
    };

    // By default, Unity keeps WebGL canvas render target size matched with
    // the DOM size of the canvas element (scaled by window.devicePixelRatio)
    // Set this to false if you want to decouple this synchronization from
    // happening inside the engine, and you would instead like to size up
    // the canvas DOM size and WebGL render target sizes yourself.
    // config.matchWebGLToCanvasSize = false;

    // If you would like all file writes inside Unity Application.persistentDataPath
    // directory to automatically persist so that the contents are remembered when
    // the user revisits the site the next time, uncomment the following line:
    // config.autoSyncPersistentDataPath = true;
    // This autosyncing is currently not the default behavior to avoid regressing
    // existing user projects that might rely on the earlier manual
    // JS_FileSystem_Sync() behavior, but in future Unity version, this will be
    // expected to change.

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      // Mobile device style: fill the whole browser client area with the game canvas:

      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);
      document.querySelector("#unity-container").className = "unity-mobile";
      canvas.className = "unity-mobile";

      // To lower canvas resolution on mobile devices to gain some
      // performance, uncomment the following line:
      // config.devicePixelRatio = 1;


    } else {
      // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:
      canvas.style.width = "960px";
      canvas.style.height = "600px";
    }

    document.querySelector("#unity-loading-bar").style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
      }).then((unityInstance) => {
        document.querySelector("#unity-loading-bar").style.display = "none";
        document.querySelector("#unity-fullscreen-button").onclick = () => {
          unityInstance.SetFullscreen(1);
        };

      }).catch((message) => {
        alert(message);
      });
    };

    document.body.appendChild(script);
  </script>

  <!-- ── Chatbot Logic ── -->
  <script>
    (function () {
      const BACKEND_URL = "http://localhost:3000/chat";

      const toggleBtn = document.getElementById("chatbot-toggle");
      const panel = document.getElementById("chatbot-panel");
      const messages = document.getElementById("chatbot-messages");
      const input = document.getElementById("chatbot-input");
      const sendBtn = document.getElementById("chatbot-send");

      // Toggle panel open / close
      toggleBtn.addEventListener("click", () => {
        panel.classList.toggle("open");
        if (panel.classList.contains("open")) input.focus();
      });

      // Send message on button click or Enter key
      sendBtn.addEventListener("click", sendMessage);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      function appendMessage(text, sender) {
        const div = document.createElement("div");
        div.className = "chat-msg " + sender;
        div.textContent = text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }

      function showTyping() {
        const el = document.createElement("div");
        el.className = "typing-indicator";
        el.id = "typing";
        el.innerHTML = "<span></span><span></span><span></span>";
        messages.appendChild(el);
        messages.scrollTop = messages.scrollHeight;
      }

      function hideTyping() {
        const el = document.getElementById("typing");
        if (el) el.remove();
      }

      async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        appendMessage(text, "user");
        input.value = "";
        sendBtn.disabled = true;
        showTyping();

        try {
          const res = await fetch(BACKEND_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text }),
          });

          const data = await res.json();
          hideTyping();

          if (res.ok && data.reply) {
            appendMessage(data.reply, "bot");
          } else {
            appendMessage("⚠️ " + (data.error || "Something went wrong."), "bot");
          }
        } catch (err) {
          hideTyping();
          appendMessage("⚠️ Could not reach the server. Is the backend running?", "bot");
        }

        sendBtn.disabled = false;
        input.focus();
      }
    })();
  </script>
</body>

</html>
